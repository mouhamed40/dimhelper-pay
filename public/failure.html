<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لم تكتمل عملية الدفع</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tahoma', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0b1220 0%, #0f172a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid rgba(248, 113, 113, 0.3);
    border-radius: 18px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #f87171, #dc2626);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .icon svg { width: 36px; height: 36px; }
  h1 { color: #f1f5f9; font-size: 22px; margin-bottom: 10px; }
  p { color: #94a3b8; font-size: 14.5px; line-height: 1.8; }
  .note { margin-top: 22px; font-size: 12.5px; color: #64748b; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>
    <h1>لم تكتمل عملية الدفع ❌</h1>
    <p>لم يتم إتمام الدفع أو تم إلغاؤه. لم يُخصم منك أي مبلغ. يمكنك المحاولة مرة أخرى من التطبيق أو التواصل مع إدارة الروضة.</p>
    <div class="note">يمكنك الآن إغلاق هذه الصفحة.</div>
  </div>
</body>
</html>
